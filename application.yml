spring:
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=vitacare_db;encrypt=true;trustServerCertificate=true
    username: vitacareuser
    password: vitacarepa
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true

  flyway:
    enabled: true
    schemas: auth_schema
    baseline-on-migrate: true

logging:
  level:
    org.hibernate.SQL: DEBUG